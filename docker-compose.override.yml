# Auto-merged by plain `docker compose up` - this is what makes local mode
# "just work" without extra flags. It has no secrets in it (those live in
# .env.local, which is gitignored), so it's safe to commit.
#
# Points the container at .env.local instead of .env, and uses a distinct
# volume name so a local run can never collide with a production volume.
# Rebuild after code changes with `docker compose up --build`.
services:
  app:
    env_file:
      - .env.local
    volumes:
      - transients-data-local:/data

volumes:
  transients-data-local:
