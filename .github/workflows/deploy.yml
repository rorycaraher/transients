name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify
        run: go build ./... && go vet ./... && go test ./...

      - name: Build linux/amd64 binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o transients ./cmd/server

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ship binary and restart service
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -i ~/.ssh/deploy_key transients "$SSH_USER@$SSH_HOST:/tmp/transients"
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" '
            set -e
            sudo mv /tmp/transients /usr/local/bin/transients
            sudo chmod +x /usr/local/bin/transients
            sudo systemctl restart transients
            sleep 2
            sudo systemctl is-active --quiet transients
          '
