{{define "title"}}NLTL - {{.Track.Title}}{{end}}
{{define "meta"}}
<meta property="og:type" content="music.song">
<meta property="og:title" content="{{.Track.Title}}">
<meta property="og:description" content="Listen on NLTL Transients">
<meta property="og:url" content="{{.ShareURL}}">
<meta property="og:image" content="{{.OGImageURL}}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="player">
<meta name="twitter:title" content="{{.Track.Title}}">
<meta name="twitter:image" content="{{.OGImageURL}}">
<meta name="twitter:player" content="{{.EmbedURL}}">
<meta name="twitter:player:width" content="480">
<meta name="twitter:player:height" content="180">
<link rel="alternate" type="application/json+oembed" href="{{.OEmbedURL}}" title="{{.Track.Title}}">
{{end}}
{{define "content"}}
<main class="narrow">
  <div class="eyebrow">Track</div>
  <h1>{{.Track.Title}}</h1>
  {{template "player" .}}
  {{if .DownloadURL}}<a class="btn-ghost btn-block" href="{{.DownloadURL}}">Download file</a>{{end}}
</main>
<script>
  const PLAYER_DATA = {{.PlayerDataJSON}};
</script>
<script src="{{static "player.js"}}"></script>
{{end}}
