{{define "title"}}NLTL - Upload{{end}}
{{define "content"}}
<main class="narrow">
  <a class="back-link" href="/admin">&#8592; Back</a>
  <h1>Upload a file</h1>

  <form id="upload-form">
    <div id="dropzone" class="dropzone">
      <div class="hint" id="dropzone-hint">Drag &amp; drop or click to select file</div>
      <div class="filename" id="dropzone-filename">No file chosen</div>
      <input type="file" id="file" accept="audio/*" required>
    </div>
    <label>
      Title (optional, defaults to filename)
      <input type="text" id="title">
    </label>
    <label>
      Expires after (days, optional, blank = never)
      <input type="number" id="expires-days" min="1">
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="downloadable">
      Downloadable
    </label>
    <button type="submit" id="submit-btn" class="btn-block" disabled>Generate private link</button>
  </form>

  <div id="progress-wrap" hidden>
    <progress id="progress" value="0" max="100"></progress>
    <p id="status-text">Uploading...</p>
  </div>

  <div id="result" class="result-panel" hidden>
    <div class="eyebrow">Upload complete</div>
    <div class="result-title" id="result-title"></div>
    <div class="eyebrow">Private link</div>
    <div class="link-row">
      <div class="link-value" id="result-link-value"></div>
      <button type="button" id="copy-btn">Copy</button>
    </div>
    <div class="result-actions">
      <a id="result-view" href="">View page</a>
      <a id="result-reset">Upload another</a>
    </div>
  </div>

  <p id="error" class="error" hidden></p>
</main>
<script src="{{static "upload.js"}}"></script>
{{end}}
