{{define "title"}}NLTL - Edit{{end}}
{{define "content"}}
<main class="narrow">
  <a class="back-link" href="/admin">&#8592; Back</a>
  <h1>Edit track</h1>

  <form method="post" action="/admin/tracks/{{.Track.Slug}}/edit">
    <label>
      Title
      <input type="text" name="title" value="{{.Track.Title}}" required>
    </label>
    <label>
      Expires at (blank = never)
      <input type="date" name="expires_at" value="{{.ExpiresAtValue}}">
    </label>
    <label class="checkbox-label">
      <input type="checkbox" name="downloadable" {{if .Track.Downloadable}}checked{{end}}>
      Downloadable
    </label>
    <button type="submit" class="btn-block">Save</button>
  </form>
</main>
{{end}}
